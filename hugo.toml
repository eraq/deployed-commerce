baseURL = "https://deployedcommerce.com/"
languageCode = "en-us"
title = "Deployed Commerce"
theme = "hugo-theme-stack"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[pagination]
  pagerSize = 10

[params]
  mainSections = ["posts"]
  description = "Technical insights on modern commerce infrastructure."

[params.sidebar]
  subtitle = "Technical writing on commerce infrastructure, self-hosting, and developer tools."
  compact = false

[params.colorScheme]
  toggle = true
  default = "auto"

[params.article]
  toc = true
  readingTime = true
  headingAnchor = false
  math = false

[params.footer]
  since = 2023

[[menu.main]]
  name = "Posts"
  url = "/posts/"
  weight = 1

[[menu.main]]
  name = "Open Source"
  url = "/open-source/"
  weight = 2

[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 3

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 4

[[menu.main]]
  name = "Colophon"
  url = "/colophon/"
  weight = 5

[[menu.social]]
  identifier = "github"
  name = "GitHub"
  url = "https://github.com/eraq"
  weight = 1

  [menu.social.params]
    icon = "brand-github"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  style = "github-dark"
  lineNos = false
  codeFences = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
